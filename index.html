<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ---- Conexión a Firebase (yalith-salon) ----
const firebaseConfig = {
  apiKey: "AIzaSyB0QNLpDUQkvCrlZDOJXLHhhE4hDRtSjKs",
  authDomain: "yalith-salon.firebaseapp.com",
  projectId: "yalith-salon",
  storageBucket: "yalith-salon.firebasestorage.app",

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const agendaDocRef = db.collection("yalith").doc("agenda"); // documento viejo, solo se usa para migrar datos una vez
const citasCol = db.collection("yalith_citas"); // cada cita es su propio documento
const clientesCol = db.collection("yalith_clientes"); // metadatos por clienta (ej. VIP)

const sanitizeClientId = name=>encodeURIComponent(name.trim().toLowerCase()).slice(0,300);
const SHARED_LOGIN = { email: "fabianbarboza@yahoo.com", password: "303036" };
const ensureSignedIn = () => auth.currentUser
  ? Promise.resolve(auth.currentUser)
  : auth.signInWithEmailAndPassword(SHARED_LOGIN.email, SHARED_LOGIN.password);

const PROMOS = [
  {name:"Mirada Completa (pestañas + cejas)", price:599},
  {name:"4x1 Cejas y Pestañas", price:550},
  {name:"Laminado de Cejas Gratis (con extensiones)", price:399},
  {name:"Retoque de pestañas", price:null},
  {name:"Reparación", price:null}
];
const SERVICES = PROMOS.map(p=>p.name);
const priceForService = name=>{const p=PROMOS.find(x=>x.name===name);return (p&&p.price!=null)?String(p.price):"";};
// Todas las promociones (incluido el retoque) generan recordatorio de retoque a 15 días
const RETOUCH_SERVICES = PROMOS.map(p=>p.name);
const RETOUCH_DAYS = 15;
const C = {bg:"#0d0d0d",card:"#161616",accent:"#c9a96e",accentFade:"rgba(201,169,110,0.12)",text:"#f0ece4",muted:"#7a7269",border:"rgba(201,169,110,0.18)",danger:"#c96e6e",success:"#6ec98a",warning:"#e0a458",vip:"#d4af37"};
const pad=n=>String(n).padStart(2,"0");
const MONTHS=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const fmt=d=>{const[y,m,dd]=d.split("-");return `${dd} ${MONTHS[+m-1]} ${y}`;};
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
const weekDates=base=>{const d=new Date(base+"T00:00:00"),day=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-((day+6)%7));return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return `${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}`;});};
const DAY_NAMES=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
let _id=Date.now();
const uid=()=>String(++_id);
const minutesUntil=(dateStr,timeStr)=>{const[h,m]=timeStr.split(":").map(Number);const d=new Date(dateStr+"T00:00:00");d.setHours(h,m,0,0);return(d-new Date())/60000;};
const daysBetween=(dateStr1,dateStr2)=>{const d1=new Date(dateStr1+"T00:00:00"),d2=new Date(dateStr2+"T00:00:00");return Math.round((d2-d1)/86400000);};
const addDays=(dateStr,n)=>{const d=new Date(dateStr+"T00:00:00");d.setDate(d.getDate()+n);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
const getReminderStatus=a=>{if(a.status==="cancelada")return null;const mins=minutesUntil(a.date,a.time);if(mins<0)return "pasada";if(mins<=120)return "ahora";if(mins<=180)return "pronto";return "pendiente";};
const cleanPhone=phone=>{const digits=phone.replace(/\D/g,"");if(digits.startsWith("52")&&digits.length>=12)return digits;return "52"+digits.replace(/^0+/,"");};
const buildWAMsg=a=>{const msg=`¡Hola ${a.client}! 👋\n\nTe recordamos que tienes tu cita en *Yalith Salón* hoy a las *${a.time}* para *${a.service}*.\n\nTe esperamos 💛\n\n_Por favor confirma tu asistencia respondiendo este mensaje._`;return `https://wa.me/${cleanPhone(a.phone)}?text=${encodeURIComponent(msg)}`;};
const buildRetouchWAMsg=a=>{const msg=`¡Hola ${a.client}! 👋\n\nYa han pasado *${RETOUCH_DAYS} días* desde tu último servicio de *${a.service}* en *Yalith Salón*.\n\n¡Es momento de tu retoque! ¿Te gustaría agendar? 💛`;return `https://wa.me/${cleanPhone(a.phone)}?text=${encodeURIComponent(msg)}`;};
const buildReactivationWAMsg=a=>{const msg=`¡Hola ${a.client}! 👋\n\nTe extrañamos en *Yalith Salón* 💛 Ya ha pasado un tiempo desde tu última visita. ¿Te gustaría agendar tu próxima cita?`;return `https://wa.me/${cleanPhone(a.phone)}?text=${encodeURIComponent(msg)}`;};
const buildDaySummaryMsg=(dateStr,dayList)=>{
  const activeAppts=dayList.filter(a=>a.status!=="cancelada").sort((a,b)=>a.time.localeCompare(b.time));
  if(activeAppts.length===0)return `📅 *Yalith Salón* — ${fmt(dateStr)}\n\nSin citas agendadas este día.`;
  const total=activeAppts.filter(a=>a.status==="confirmada").reduce((s,a)=>s+(parseFloat(a.price)||0),0);
  const lines=activeAppts.map(a=>{
    const tag=a.status==="no_llego"?" (no llegó)":"";
    return `• ${a.time} — ${a.client} · ${a.service}${a.price?` · ${money(a.price)}`:""}${tag}`;
  });
  return `📅 *Resumen del día — Yalith Salón*\n${fmt(dateStr)}\n\n${lines.join("\n")}\n\nTotal esperado: *${money(total)}*`;
};
const buildDaySummaryShareUrl=(dateStr,dayList)=>`https://api.whatsapp.com/send?text=${encodeURIComponent(buildDaySummaryMsg(dateStr,dayList))}`;
const money=n=>`$${(n||0).toLocaleString("es-MX",{minimumFractionDigits:0,maximumFractionDigits:0})}`;
const STORAGE_KEY="yalith_agenda_v3";
const OLD_STORAGE_KEY="yalith_agenda_v2";
const DEMO=[{id:uid(),client:"María López",phone:"9981234567",service:"Extensiones volumen",date:todayStr(),time:"10:00",notes:"Alérgica a látex",status:"confirmada",price:""},{id:uid(),client:"Sofía Ramírez",phone:"9982345678",service:"Retoque clásico",date:todayStr(),time:"12:30",notes:"",status:"confirmada",price:""},{id:uid(),client:"Valeria Torres",phone:"9983456789",service:"Lifting de pestañas",date:todayStr(),time:"15:00",notes:"Primera visita",status:"confirmada",price:""}];
const normalizeAppt=a=>({...a,price:a.price??"",deposit:a.deposit??"",isNew:a.isNew||false,retouchDismissed:a.retouchDismissed||false});
const loadAppts=()=>{
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){const p=JSON.parse(raw);if(Array.isArray(p)&&p.length>0)return p.map(normalizeAppt);}
    // migración desde versión anterior sin precio
    const old=localStorage.getItem(OLD_STORAGE_KEY);
    if(old){const p=JSON.parse(old);if(Array.isArray(p)&&p.length>0)return p.map(normalizeAppt);}
  }catch{}
  return DEMO;
};
const saveAppts=appts=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(appts));return true;}catch{return false;}};
// Escritura de una cita individual como su propio documento en la colección yalith_citas
const syncAvailability=async appt=>{
  try{
    if(appt.status==="confirmada"){
      await horariosCol.doc(String(appt.id)).set({date:appt.date,time:appt.time});
    }else{
      await horariosCol.doc(String(appt.id)).delete();
    }
  }catch(e){console.error("sync availability error",e);}
};
const putAppt=async appt=>{try{await citasCol.doc(String(appt.id)).set(appt,{merge:true});syncAvailability(appt);}catch(e){console.error("firestore write error",e);}};
const patchAppt=async(id,fields)=>{
  try{
    await citasCol.doc(String(id)).set(fields,{merge:true});
    if("status" in fields||"date" in fields||"time" in fields){
      const doc=await citasCol.doc(String(id)).get();
      if(doc.exists)syncAvailability({id,...doc.data()});
    }
  }catch(e){console.error("firestore write error",e);}
};
// Migración única: si la colección nueva está vacía, sube lo que haya en el documento viejo (o en caché local)
const migrateIfNeeded=async()=>{
  try{
    const existing=await citasCol.limit(1).get();
    if(!existing.empty)return;
    let source=[];
    const oldSnap=await agendaDocRef.get();
    if(oldSnap.exists&&Array.isArray(oldSnap.data().appts)&&oldSnap.data().appts.length>0){
      source=oldSnap.data().appts;
    }else{
      source=loadAppts();
    }
    const clean=source.map(normalizeAppt);
    const batch=db.batch();
    clean.forEach(a=>{
      batch.set(citasCol.doc(String(a.id)),a);
      if(a.status==="confirmada")batch.set(horariosCol.doc(String(a.id)),{date:a.date,time:a.time});
    });
    await batch.commit();
  }catch(e){console.error("migration error",e);}
};
// Respaldo único: si hay citas confirmadas que nunca se sincronizaron a horarios_ocupados
// (por ejemplo, migradas antes de que existiera esa colección), las sube ahora.
const backfillHorariosIfNeeded=async()=>{
  try{
    const horariosSnap=await horariosCol.limit(1).get();
    if(!horariosSnap.empty)return;
    const citasSnap=await citasCol.where("status","==","confirmada").get();
    if(citasSnap.empty)return;
    const batch=db.batch();
    citasSnap.docs.forEach(d=>{const a=d.data();batch.set(horariosCol.doc(d.id),{date:a.date,time:a.time});});
    await batch.commit();
  }catch(e){console.error("backfill horarios error",e);}
};
const S={btn:{display:"inline-flex",alignItems:"center",gap:6,background:C.accentFade,border:`1px solid ${C.accent}`,color:C.accent,borderRadius:10,padding:"10px 16px",fontSize:13,cursor:"pointer",letterSpacing:0.5},navBtn:{background:"none",border:`1px solid ${C.border}`,color:C.muted,width:38,height:38,borderRadius:8,cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"},input:{width:"100%",background:"#0d0d0d",border:`1px solid rgba(201,169,110,0.25)`,borderRadius:8,padding:"12px",color:C.text,fontSize:15,outline:"none"}};
function Label({children}){return <div style={{fontSize:10,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:5}}>{children}</div>;}
function Val({children}){return <div style={{fontSize:15,color:C.text}}>{children}</div>;}
function Field({label,children,style}){return <div style={{marginBottom:14,...style}}><Label>{label}</Label>{children}</div>;}
function ModalHeader({title,onClose}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><div style={{fontSize:18,color:C.text}}>{title}</div><button onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:26,cursor:"pointer",lineHeight:1}}>×</button></div>);}
function ApptCard({a,onClick,compact}){const rs=getReminderStatus(a);const showWA=!compact&&a.phone&&(rs==="ahora"||rs==="pronto");const notConfirmed=a.status!=="confirmada";const borderColor=a.status==="cancelada"?C.danger:a.status==="no_llego"?C.warning:C.accent;return(<div onClick={onClick} className="tap" style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${borderColor}`,borderRadius:10,padding:compact?"10px 12px":"14px 16px",marginBottom:10,cursor:"pointer",opacity:notConfirmed?0.5:1}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:compact?14:16,color:C.text,marginBottom:3}}>{a.client}</div><div style={{fontSize:12,color:C.muted}}>{a.service}</div></div><div style={{textAlign:"right"}}>{a.price&&<div style={{fontSize:12,color:C.success,marginBottom:2}}>{money(a.price)}</div>}<div style={{fontSize:15,color:C.accent,fontWeight:600}}>{a.time}</div>{compact&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{fmt(a.date)}</div>}{showWA&&<div style={{fontSize:10,color:"#25D366",marginTop:4}}>📲 listo</div>}</div></div></div>);}
function Pill({label,active,color}){return <span style={{display:"inline-block",fontSize:10,padding:"3px 8px",borderRadius:20,marginRight:6,marginBottom:4,background:active?`${color}22`:"rgba(255,255,255,0.04)",color:active?color:C.muted,border:`1px solid ${active?color:C.border}`}}>{label}</span>;}
function HistoryRow({a,onClick}){
  const isRetouch=a.service==="Retoque de pestañas";
  const isRepair=a.service==="Reparación";
  const notConfirmed=a.status!=="confirmada";
  const borderColor=a.status==="cancelada"?C.danger:a.status==="no_llego"?C.warning:C.accent;
  const statusColor=a.status==="cancelada"?C.danger:a.status==="no_llego"?C.warning:C.success;
  return(<div onClick={onClick} className="tap" style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${borderColor}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer",opacity:notConfirmed?0.7:1}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
      <div style={{fontSize:13,color:C.text}}>{fmt(a.date)} · {a.time}</div>
      <div style={{fontSize:12,color:C.muted}}>{a.service}</div>
    </div>
    <div style={{display:"flex",flexWrap:"wrap",marginBottom:(a.price||a.deposit)?6:0}}>
      <Pill label={STATUS_LABELS[a.status]||a.status} active color={statusColor}/>
      <Pill label={a.isNew?"Clienta nueva":"Ya era clienta"} active color={a.isNew?C.success:C.muted}/>
      <Pill label="Retoque" active={isRetouch} color={C.accent}/>
      <Pill label="Reparación" active={isRepair} color={C.danger}/>
      {a.deposit&&<Pill label={`Apartó ${money(a.deposit)}`} active color={C.accent}/>}
    </div>
    {a.price&&<div style={{fontSize:12,color:C.success}}>Precio: {money(a.price)}</div>}
  </div>);
}
const STATUS_LABELS={confirmada:"Confirmada",cancelada:"Canceló",no_llego:"No llegó"};
const STATUS_COLORS={confirmada:"success",cancelada:"danger",no_llego:"warning"};
function App(){
  const[appts,setAppts]=useState(loadAppts);
  const[cloudStatus,setCloudStatus]=useState("conectando");
  const[vipMap,setVipMap]=useState({});
  const[requests,setRequests]=useState([]);
  useEffect(()=>{
    let unsub=()=>{};
    let unsubClientes=()=>{};
    let unsubRequests=()=>{};
    let cancelled=false;
    ensureSignedIn()
      .then(()=>migrateIfNeeded())
      .then(()=>backfillHorariosIfNeeded())
      .then(()=>{
        if(cancelled)return;
        unsub=citasCol.onSnapshot(snap=>{
          const list=snap.docs.map(d=>normalizeAppt({id:d.id,...d.data()}));
          if(list.length>0){setAppts(list);saveAppts(list);}
          setCloudStatus("conectado");
        },err=>{console.error(err);setCloudStatus("sin conexión (usando datos locales)");});
        unsubClientes=clientesCol.onSnapshot(snap=>{
          const map={};
          snap.docs.forEach(d=>{if(d.data().vip)map[d.data().name||d.id]=true;});
          setVipMap(map);
        },err=>console.error(err));
        unsubRequests=solicitudesCol.onSnapshot(snap=>{
          setRequests(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)));
        },err=>console.error(err));
      })
      .catch(err=>{console.error("auth/migración error",err);setCloudStatus("sin conexión (usando datos locales)");});
    return ()=>{cancelled=true;unsub();unsubClientes();unsubRequests();};
  },[]);
  const[savedMsg,setSavedMsg]=useState("");
  const[view,setView]=useState("week");
  const[selDate,setSelDate]=useState(todayStr());
  const[weekBase,setWeekBase]=useState(todayStr());
  const[moneyWeekBase,setMoneyWeekBase]=useState(todayStr());
  const[modal,setModal]=useState(null);
  const[activeA,setActiveA]=useState(null);
  const[searchQ,setSearchQ]=useState("");
  const[now,setNow]=useState(new Date());
  const[form,setForm]=useState({client:"",phone:"",service:SERVICES[0],date:todayStr(),time:"10:00",notes:"",price:"",deposit:"",isNew:false});
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(t);},[]);
  useEffect(()=>{const ok=saveAppts(appts);setSavedMsg(ok?"✓ guardado":"⚠ error");const t=setTimeout(()=>setSavedMsg(""),2500);return()=>clearTimeout(t);},[appts]);
  const week=useMemo(()=>weekDates(weekBase),[weekBase]);
  const moneyWeek=useMemo(()=>weekDates(moneyWeekBase),[moneyWeekBase]);
  const byDate=useMemo(()=>{const m={};appts.forEach(a=>{if(!m[a.date])m[a.date]=[];m[a.date].push(a);});Object.keys(m).forEach(k=>m[k].sort((a,b)=>a.time.localeCompare(b.time)));return m;},[appts]);
  const dayAppts=byDate[selDate]||[];
  const today=todayStr();
  const reminderAppts=useMemo(()=>appts.filter(a=>a.status==="confirmada"&&a.phone).map(a=>({...a,_rs:getReminderStatus(a)})).filter(a=>a._rs==="ahora"||a._rs==="pronto").sort((a,b)=>a.time.localeCompare(b.time)),[appts,now]);
  const badge=reminderAppts.filter(a=>a._rs==="ahora").length;

  // ---- Función 1: dinero semanal (lunes a domingo) ----
  const moneyWeekAppts=useMemo(()=>appts.filter(a=>a.status==="confirmada"&&moneyWeek.includes(a.date)),[appts,moneyWeek]);
  const moneyWeekTotal=useMemo(()=>moneyWeekAppts.reduce((sum,a)=>sum+(parseFloat(a.price)||0),0),[moneyWeekAppts]);
  const moneyByDay=useMemo(()=>{const m={};moneyWeek.forEach(d=>{m[d]=moneyWeekAppts.filter(a=>a.date===d).reduce((s,a)=>s+(parseFloat(a.price)||0),0);});return m;},[moneyWeek,moneyWeekAppts]);
  const shiftMoneyWeek=delta=>{const d=new Date(moneyWeekBase+"T00:00:00");d.setDate(d.getDate()+delta*7);setMoneyWeekBase(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);};

  // ---- Función 2: clientes recurrentes ----
  const clientStats=useMemo(()=>{
    const cl={};
    appts.forEach(a=>{if(!cl[a.client])cl[a.client]={client:a.client,phone:a.phone,appts:[]};cl[a.client].appts.push(a);});
    return Object.values(cl).map(c=>{
      const confirmed=c.appts.filter(a=>a.status==="confirmada");
      return {...c,total:c.appts.length,confirmedCount:confirmed.length,returns:Math.max(0,confirmed.length-1)};
    }).sort((a,b)=>b.confirmedCount-a.confirmedCount);
  },[appts]);

  const clientHistory=useMemo(()=>{if(!searchQ.trim())return[];const q=searchQ.toLowerCase(),cl={};appts.forEach(a=>{if(a.client.toLowerCase().includes(q)||a.phone.includes(q)){if(!cl[a.client])cl[a.client]={client:a.client,phone:a.phone,appts:[]};cl[a.client].appts.push(a);}});return Object.values(cl).map(c=>({...c,appts:c.appts.sort((a,b)=>b.date.localeCompare(a.date))}));},[searchQ,appts]);

  // ---- Función 3: recordatorio de retoque a 15 días ----
  const retouchDue=useMemo(()=>{
    // última cita confirmada de extensiones por clienta
    const byClient={};
    appts.filter(a=>a.status==="confirmada"&&RETOUCH_SERVICES.includes(a.service)).forEach(a=>{
      if(!byClient[a.client]||a.date>byClient[a.client].date) byClient[a.client]=a;
    });
    return Object.values(byClient).filter(a=>{
      if(a.retouchDismissed) return false;
      const diff=daysBetween(a.date,today);
      return diff>=RETOUCH_DAYS;
    }).sort((a,b)=>daysBetween(b.date,today)-daysBetween(a.date,today));
  },[appts,today]);
  const retouchBadge=retouchDue.length;
  const dismissRetouch=id=>{const next=appts.map(a=>a.id===id?{...a,retouchDismissed:true}:a);setAppts(next);patchAppt(id,{retouchDismissed:true});};
  const toggleVip=name=>{
    const newVal=!vipMap[name];
    setVipMap(prev=>({...prev,[name]:newVal}));
    clientesCol.doc(sanitizeClientId(name)).set({name,vip:newVal},{merge:true}).catch(e=>console.error(e));
  };
  const approveRequest=req=>{
    const newAppt={client:req.client,phone:req.phone||"",service:req.service,date:req.date,time:req.time,notes:req.notes||"",price:priceForService(req.service),deposit:(req.depositConfirmed&&req.proofSentByWhatsapp)?String(req.depositAmount||50):"",isNew:req.isNewClient!==undefined?req.isNewClient:true,id:uid(),status:"confirmada",retouchDismissed:false};
    setAppts(prev=>[...prev,newAppt]);
    putAppt(newAppt);
    solicitudesCol.doc(req.id).delete().catch(e=>console.error(e));
  };
  const rejectRequest=id=>{solicitudesCol.doc(id).delete().catch(e=>console.error(e));};

  // ---- Consejos automáticos ----
  const insights=useMemo(()=>{
    const confirmed=appts.filter(a=>a.status==="confirmada");
    // Clientas inactivas: 30+ días desde su última visita y sin cita futura agendada
    const lastByClient={};
    confirmed.forEach(a=>{if(!lastByClient[a.client]||a.date>lastByClient[a.client].date)lastByClient[a.client]=a;});
    const hasFuture=client=>confirmed.some(a=>a.client===client&&a.date>today);
    const inactive=Object.values(lastByClient).filter(a=>daysBetween(a.date,today)>=30&&!hasFuture(a.client)).sort((a,b)=>daysBetween(b.date,today)-daysBetween(a.date,today));
    // Comparación de ingresos: semana actual vs semana pasada
    const thisWeekDates=weekDates(today);
    const lastWeekDates=weekDates(addDays(today,-7));
    const sumWeek=dates=>confirmed.filter(a=>dates.includes(a.date)).reduce((s,a)=>s+(parseFloat(a.price)||0),0);
    const thisWeekTotal=sumWeek(thisWeekDates);
    const lastWeekTotal=sumWeek(lastWeekDates);
    const weekChangePct=lastWeekTotal>0?Math.round(((thisWeekTotal-lastWeekTotal)/lastWeekTotal)*100):null;
    // Clientas que no concretan seguido (sus últimas 2 citas, ambas canceladas o no llegó)
    const byClientAll={};
    appts.forEach(a=>{if(!byClientAll[a.client])byClientAll[a.client]=[];byClientAll[a.client].push(a);});
    const PROBLEM_STATUSES=["cancelada","no_llego"];
    const repeatedCancellers=Object.entries(byClientAll).filter(([,list])=>{
      const sorted=[...list].sort((a,b)=>b.date.localeCompare(a.date));
      return sorted.length>=2&&PROBLEM_STATUSES.includes(sorted[0].status)&&PROBLEM_STATUSES.includes(sorted[1].status);
    }).map(([name])=>name);
    // Servicio más vendido del mes actual
    const monthAppts=confirmed.filter(a=>a.date.slice(0,7)===today.slice(0,7));
    const serviceCounts={};
    monthAppts.forEach(a=>{serviceCounts[a.service]=(serviceCounts[a.service]||0)+1;});
    const topService=Object.entries(serviceCounts).sort((a,b)=>b[1]-a[1])[0]||null;
    // Día de la semana con más ingresos (histórico)
    const dayTotals=Array(7).fill(0);
    confirmed.forEach(a=>{const idx=(new Date(a.date+"T00:00:00").getDay()+6)%7;dayTotals[idx]+=(parseFloat(a.price)||0);});
    let bestDayIdx=0;dayTotals.forEach((v,i)=>{if(v>dayTotals[bestDayIdx])bestDayIdx=i;});
    const hasDayData=dayTotals.some(v=>v>0);
    // Tasa de cancelación del mes actual (sobre todas las citas del mes, sin importar estado)
    const monthAllAppts=appts.filter(a=>a.date.slice(0,7)===today.slice(0,7));
    const monthCancelled=monthAllAppts.filter(a=>a.status==="cancelada").length;
    const cancelRatePct=monthAllAppts.length>0?Math.round((monthCancelled/monthAllAppts.length)*100):null;
    // Anticipo: % de citas confirmadas con anticipo vs sin anticipo, y promedio cobrado
    const withDeposit=confirmed.filter(a=>parseFloat(a.deposit)>0);
    const withoutDeposit=confirmed.filter(a=>!(parseFloat(a.deposit)>0));
    const depositPct=confirmed.length>0?Math.round((withDeposit.length/confirmed.length)*100):null;
    const avgDeposit=withDeposit.length>0?Math.round(withDeposit.reduce((s,a)=>s+parseFloat(a.deposit),0)/withDeposit.length):0;
    // Clientas nuevas vs recurrentes este mes (por cita registrada)
    const newCount=monthAppts.filter(a=>a.isNew).length;
    const returningCount=monthAppts.length-newCount;
    // Top 5 clientas que más han gastado (histórico, citas confirmadas)
    const spendByClient={};
    confirmed.forEach(a=>{spendByClient[a.client]=(spendByClient[a.client]||0)+(parseFloat(a.price)||0);});
    const topSpenders=Object.entries(spendByClient).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,5);
    return {inactive,thisWeekTotal,lastWeekTotal,weekChangePct,repeatedCancellers,topService,dayTotals,bestDayIdx,hasDayData,cancelRatePct,monthCancelled,monthAllApptsCount:monthAllAppts.length,depositPct,avgDeposit,withDepositCount:withDeposit.length,withoutDepositCount:withoutDeposit.length,newCount,returningCount,topSpenders};
  },[appts,today]);
  const insightsCount=insights.inactive.length+insights.repeatedCancellers.length;

  const openNew=date=>{setForm({client:"",phone:"",service:SERVICES[0],date:date||selDate,time:"10:00",notes:"",price:priceForService(SERVICES[0]),deposit:"",isNew:true});setModal("new");};
  const saveNew=()=>{if(!form.client.trim())return;const newAppt={...form,id:uid(),status:"confirmada",retouchDismissed:false};setAppts(prev=>[...prev,newAppt]);putAppt(newAppt);setModal(null);};
  const openEdit=a=>{setForm({client:a.client,phone:a.phone,service:a.service,date:a.date,time:a.time,notes:a.notes,price:a.price||"",deposit:a.deposit||"",isNew:a.isNew||false});setActiveA(a);setModal("edit");};
  const saveEdit=()=>{const updated={...activeA,...form};setAppts(prev=>prev.map(a=>a.id===activeA.id?updated:a));putAppt(updated);setModal(null);};
  const cancelAppt=id=>{setAppts(prev=>prev.map(a=>a.id===id?{...a,status:"cancelada"}:a));patchAppt(id,{status:"cancelada"});setModal(null);};
  const noShowAppt=id=>{setAppts(prev=>prev.map(a=>a.id===id?{...a,status:"no_llego"}:a));patchAppt(id,{status:"no_llego"});setModal(null);};
  const restore=id=>{setAppts(prev=>prev.map(a=>a.id===id?{...a,status:"confirmada"}:a));patchAppt(id,{status:"confirmada"});setModal(null);};
  const shiftDay=delta=>{const d=new Date(selDate+"T00:00:00");d.setDate(d.getDate()+delta);setSelDate(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);};
  const shiftWeek=delta=>{const d=new Date(weekBase+"T00:00:00");d.setDate(d.getDate()+delta*7);setWeekBase(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);};
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,maxWidth:480,margin:"0 auto",paddingBottom:40}}>
      <div style={{padding:"max(env(safe-area-inset-top),20px) 20px 0px"}}>
        <div style={{padding:"16px 0 0",borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",paddingBottom:14}}>
            <div><div style={{fontSize:10,letterSpacing:4,color:C.accent,textTransform:"uppercase",marginBottom:4}}>Agenda</div><div style={{fontSize:26,fontWeight:400,letterSpacing:1}}>Yalith Salón</div></div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              {savedMsg&&<div style={{fontSize:10,color:savedMsg.startsWith("✓")?C.success:C.danger}}>{savedMsg}</div>}
              <div style={{fontSize:9,color:cloudStatus==="conectado"?C.success:C.muted}}>{cloudStatus==="conectado"?"☁️ sincronizado":cloudStatus}</div>
              <button onClick={()=>openNew()} style={S.btn} className="tap">+ Nueva cita</button>
            </div>
          </div>
          <div style={{display:"flex",overflowX:"auto"}}>
            {[["week","Semana"],["day","Día"],["money","💰"],["clients","Clientas"],["history","Historial"],["retouch","🔁"],["advice","💡"],["requests","📋"],["reminders","📲"]].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} style={{flex:"1 0 auto",minWidth:46,padding:"10px 0",background:"none",border:"none",cursor:"pointer",color:view===v?C.accent:C.muted,borderBottom:view===v?`2px solid ${C.accent}`:"2px solid transparent",fontSize:13,position:"relative"}}>
                {l}
                {v==="reminders"&&badge>0&&<span style={{position:"absolute",top:6,right:"14%",background:C.danger,color:"#fff",fontSize:9,borderRadius:10,padding:"1px 5px"}}>{badge}</span>}
                {v==="retouch"&&retouchBadge>0&&<span style={{position:"absolute",top:6,right:"14%",background:C.danger,color:"#fff",fontSize:9,borderRadius:10,padding:"1px 5px"}}>{retouchBadge}</span>}
                {v==="advice"&&insightsCount>0&&<span style={{position:"absolute",top:6,right:"14%",background:C.danger,color:"#fff",fontSize:9,borderRadius:10,padding:"1px 5px"}}>{insightsCount}</span>}
                {v==="requests"&&requests.length>0&&<span style={{position:"absolute",top:6,right:"14%",background:C.danger,color:"#fff",fontSize:9,borderRadius:10,padding:"1px 5px"}}>{requests.length}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      {view==="week"&&(<div style={{padding:"16px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><button onClick={()=>shiftWeek(-1)} style={S.navBtn} className="tap">‹</button><span style={{fontSize:13,color:C.muted}}>{fmt(week[0])} — {fmt(week[6])}</span><button onClick={()=>shiftWeek(1)} style={S.navBtn} className="tap">›</button></div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>{week.map((d,i)=>{const confirmed=(byDate[d]||[]).filter(a=>a.status==="confirmada").length;const isToday=d===today,isSel=d===selDate;return(<button key={d} onClick={()=>{setSelDate(d);setView("day");}} className="tap" style={{background:isSel?C.accentFade:isToday?"rgba(255,255,255,0.04)":"none",border:`1px solid ${isToday?C.accent:C.border}`,borderRadius:10,padding:"10px 4px",cursor:"pointer",textAlign:"center"}}><div style={{fontSize:9,color:C.muted,letterSpacing:1,marginBottom:3}}>{DAY_NAMES[i]}</div><div style={{fontSize:18,color:isToday?C.accent:C.text,fontWeight:isToday?600:400}}>{d.split("-")[2]}</div>{confirmed>0&&<div style={{marginTop:5,display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center"}}>{Array.from({length:Math.min(confirmed,3)}).map((_,j)=><div key={j} style={{width:5,height:5,borderRadius:"50%",background:C.accent}}/>)}</div>}</button>);})}</div><div style={{marginTop:20}}><div style={{fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:12}}>Hoy · {fmt(today)}</div>{(byDate[today]||[]).filter(a=>a.status==="confirmada").length===0?<div style={{color:C.muted,fontSize:14,textAlign:"center",padding:"20px 0"}}>Sin citas hoy</div>:(byDate[today]||[]).filter(a=>a.status==="confirmada").map(a=><ApptCard key={a.id} a={a} onClick={()=>{setActiveA(a);setModal("detail");}}/>)}</div></div>)}
      {view==="day"&&(<div style={{padding:"16px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><button onClick={()=>shiftDay(-1)} style={S.navBtn} className="tap">‹</button><div style={{textAlign:"center"}}><div style={{fontSize:20}}>{fmt(selDate)}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{dayAppts.filter(a=>a.status==="confirmada").length} citas confirmadas</div></div><button onClick={()=>shiftDay(1)} style={S.navBtn} className="tap">›</button></div><div style={{display:"flex",gap:8,marginBottom:16}}><button onClick={()=>openNew(selDate)} className="tap" style={{...S.btn,flex:1,justifyContent:"center"}}>+ Agregar cita</button><a href={buildDaySummaryShareUrl(selDate,dayAppts)} target="_blank" rel="noreferrer" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:"rgba(37,211,102,0.12)",border:"1px solid #25D366",color:"#25D366",borderRadius:10,padding:"10px 0",fontSize:13,textDecoration:"none"}}>📤 Compartir resumen</a></div>{dayAppts.length===0?<div style={{color:C.muted,fontSize:14,textAlign:"center",padding:"40px 0"}}>Sin citas este día</div>:dayAppts.map(a=><ApptCard key={a.id} a={a} onClick={()=>{setActiveA(a);setModal("detail");}}/>)}</div>)}

      {view==="money"&&(<div style={{padding:"16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><button onClick={()=>shiftMoneyWeek(-1)} style={S.navBtn} className="tap">‹</button><span style={{fontSize:13,color:C.muted}}>{fmt(moneyWeek[0])} — {fmt(moneyWeek[6])}</span><button onClick={()=>shiftMoneyWeek(1)} style={S.navBtn} className="tap">›</button></div>
        <div style={{background:C.card,border:`1px solid ${C.accent}`,borderRadius:14,padding:"24px 18px",textAlign:"center",marginBottom:20}}>
          <Label>Total de la semana</Label>
          <div style={{fontSize:36,color:C.accent,fontWeight:600,marginTop:6}}>{money(moneyWeekTotal)}</div>
          <div style={{fontSize:12,color:C.muted,marginTop:6}}>{moneyWeekAppts.length} cita{moneyWeekAppts.length!==1?"s":""} confirmada{moneyWeekAppts.length!==1?"s":""}</div>
        </div>
        <div style={{fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:12}}>Por día</div>
        {moneyWeek.map((d,i)=>(
          <div key={d} className="tap" onClick={()=>{setSelDate(d);setView("day");}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 16px",marginBottom:8,cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:11,color:d===today?C.accent:C.muted,minWidth:32}}>{DAY_NAMES[i]}</div>
              <div style={{fontSize:13,color:C.text}}>{fmt(d).split(" ").slice(0,2).join(" ")}</div>
            </div>
            <div style={{fontSize:15,color:moneyByDay[d]>0?C.success:C.muted,fontWeight:moneyByDay[d]>0?600:400}}>{money(moneyByDay[d])}</div>
          </div>
        ))}
        {moneyWeekTotal===0&&<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"16px 0"}}>Agrega el precio en cada cita (al crear o editar) para ver el total aquí.</div>}
      </div>)}

      {view==="clients"&&(<div style={{padding:"16px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:6}}>Clientas que regresan</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:18}}>Ordenadas por número de citas confirmadas · toca ⭐ para marcar VIP</div>
        {clientStats.length===0&&<div style={{color:C.muted,fontSize:14,textAlign:"center",padding:"40px 0"}}>Aún no hay clientas registradas</div>}
        {clientStats.map(c=>(
          <div key={c.client} style={{background:C.card,border:`1px solid ${vipMap[c.client]?C.vip:C.border}`,borderRadius:10,padding:"14px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div onClick={()=>{setSearchQ(c.client);setView("history");}} className="tap" style={{cursor:"pointer",flex:1}}>
              <div style={{fontSize:15,display:"flex",alignItems:"center",gap:6}}>{c.client}{vipMap[c.client]&&<span style={{fontSize:11,color:C.vip}}>VIP</span>}</div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>{c.phone||"sin teléfono"}</div>
            </div>
            <button onClick={()=>toggleVip(c.client)} className="tap" style={{background:"none",border:"none",fontSize:20,padding:"0 8px",cursor:"pointer",filter:vipMap[c.client]?"none":"grayscale(1) opacity(0.4)"}}>⭐</button>
            <div onClick={()=>{setSearchQ(c.client);setView("history");}} className="tap" style={{textAlign:"right",cursor:"pointer"}}>
              <div style={{fontSize:18,color:C.accent,fontWeight:600}}>{c.confirmedCount}</div>
              <div style={{fontSize:10,color:C.muted}}>{c.returns>0?`${c.returns} regreso${c.returns!==1?"s":""}`:"clienta nueva"}</div>
            </div>
          </div>
        ))}
      </div>)}

      {view==="retouch"&&(<div style={{padding:"16px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:6}}>Retoque de pestañas</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Clientas con {RETOUCH_DAYS}+ días desde su último servicio de extensiones</div>
        {retouchDue.length===0&&(<div style={{textAlign:"center",padding:"40px 0"}}><div style={{fontSize:40,marginBottom:12}}>✅</div><div style={{color:C.muted,fontSize:14}}>Nadie pendiente de retoque por ahora</div></div>)}
        {retouchDue.map(a=>{
          const diff=daysBetween(a.date,today);
          return(<div key={a.client+a.date} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div><div style={{fontSize:16,marginBottom:3}}>{a.client}</div><div style={{fontSize:12,color:C.muted}}>{a.service}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:13,color:C.danger}}>hace {diff} días</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>último: {fmt(a.date)}</div></div>
            </div>
            <div style={{display:"flex",gap:8}}>
              {a.phone?(<a href={buildRetouchWAMsg(a)} target="_blank" rel="noreferrer" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"rgba(37,211,102,0.15)",border:"1px solid #25D366",color:"#25D366",borderRadius:10,padding:"11px 0",fontSize:13,textDecoration:"none"}}>📲 Recordar</a>):(<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:12}}>sin teléfono</div>)}
              <button onClick={()=>dismissRetouch(a.id)} className="tap" style={{flex:1,background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:10,padding:"11px 0",fontSize:13,cursor:"pointer"}}>Ya agendó</button>
            </div>
          </div>);
        })}
      </div>)}

      {view==="advice"&&(<div style={{padding:"16px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:6}}>Consejos automáticos</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Basado en tus datos guardados</div>

        <div style={{background:C.card,border:`1px solid ${C.accent}`,borderRadius:14,padding:"18px",marginBottom:16}}>
          <Label>Ingresos: esta semana vs la pasada</Label>
          <div style={{display:"flex",alignItems:"baseline",gap:10,marginTop:6}}>
            <div style={{fontSize:26,color:C.accent,fontWeight:600}}>{money(insights.thisWeekTotal)}</div>
            {insights.weekChangePct!==null&&<div style={{fontSize:13,color:insights.weekChangePct>=0?C.success:C.danger}}>{insights.weekChangePct>=0?"▲":"▼"} {Math.abs(insights.weekChangePct)}%</div>}
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:4}}>Semana pasada: {money(insights.lastWeekTotal)}</div>
        </div>

        {insights.topService&&(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
          <Label>Servicio más vendido este mes</Label>
          <div style={{fontSize:15,color:C.text,marginTop:4}}>{insights.topService[0]}</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>{insights.topService[1]} cita{insights.topService[1]!==1?"s":""} este mes</div>
        </div>)}

        {insights.hasDayData&&(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:20}}>
          <Label>Mejor día de la semana</Label>
          <div style={{fontSize:15,color:C.text,marginTop:4}}>{DAY_NAMES[insights.bestDayIdx]}</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>{money(insights.dayTotals[insights.bestDayIdx])} acumulado histórico</div>
        </div>)}

        {insights.cancelRatePct!==null&&(<div style={{background:C.card,border:`1px solid ${insights.cancelRatePct>=20?C.danger:C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
          <Label>Tasa de cancelación este mes</Label>
          <div style={{fontSize:22,color:insights.cancelRatePct>=20?C.danger:C.text,fontWeight:600,marginTop:4}}>{insights.cancelRatePct}%</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>{insights.monthCancelled} de {insights.monthAllApptsCount} citas canceladas</div>
        </div>)}

        {insights.depositPct!==null&&(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
          <Label>Anticipos</Label>
          <div style={{fontSize:15,color:C.text,marginTop:4}}>{insights.depositPct}% de tus citas llevan anticipo</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>{insights.withDepositCount} con anticipo (promedio {money(insights.avgDeposit)}) · {insights.withoutDepositCount} sin anticipo</div>
        </div>)}

        {(insights.newCount+insights.returningCount)>0&&(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:20}}>
          <Label>Nuevas vs. recurrentes este mes</Label>
          <div style={{display:"flex",gap:20,marginTop:6}}>
            <div><div style={{fontSize:20,color:C.success,fontWeight:600}}>{insights.newCount}</div><div style={{fontSize:11,color:C.muted}}>nuevas</div></div>
            <div><div style={{fontSize:20,color:C.accent,fontWeight:600}}>{insights.returningCount}</div><div style={{fontSize:11,color:C.muted}}>recurrentes</div></div>
          </div>
        </div>)}

        {insights.topSpenders.length>0&&(<div style={{marginBottom:20}}>
          <div style={{fontSize:10,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:10}}>Top 5 clientas (gasto histórico)</div>
          {insights.topSpenders.map(([name,total],i)=>(
            <div key={name} onClick={()=>{setSearchQ(name);setView("history");}} className="tap" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 14px",marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:14}}>{i+1}. {name}</div>
              <div style={{fontSize:14,color:C.success,fontWeight:600}}>{money(total)}</div>
            </div>
          ))}
        </div>)}

        <div style={{fontSize:10,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:10}}>Clientas inactivas (30+ días)</div>
        {insights.inactive.length===0?(<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"16px 0",marginBottom:20}}>Ninguna clienta inactiva por ahora</div>):(insights.inactive.map(a=>{
          const diff=daysBetween(a.date,today);
          return(<div key={a.client} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{fontSize:15}}>{a.client}</div>
              <div style={{fontSize:12,color:C.danger}}>hace {diff} días</div>
            </div>
            {a.phone?(<a href={buildReactivationWAMsg(a)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"rgba(37,211,102,0.15)",border:"1px solid #25D366",color:"#25D366",borderRadius:10,padding:"10px 0",fontSize:13,textDecoration:"none"}}>📲 Reactivar por WhatsApp</a>):(<div style={{fontSize:12,color:C.muted,textAlign:"center"}}>sin teléfono</div>)}
          </div>);
        }))}

        {insights.repeatedCancellers.length>0&&(<>
          <div style={{fontSize:10,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:10,marginTop:8}}>No concretan seguido (revisar)</div>
          {insights.repeatedCancellers.map(name=>(
            <div key={name} onClick={()=>{setSearchQ(name);setView("history");}} className="tap" style={{background:C.card,border:`1px solid ${C.danger}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer",fontSize:14}}>{name}<span style={{fontSize:11,color:C.muted,marginLeft:8}}>sus últimas 2 citas fueron canceladas o no llegó</span></div>
          ))}
        </>)}
      </div>)}

      {view==="requests"&&(<div style={{padding:"16px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:6}}>Solicitudes de clientas</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Reservadas desde la página pública, pendientes de tu aprobación</div>
        {requests.length===0&&(<div style={{textAlign:"center",padding:"40px 0"}}><div style={{fontSize:40,marginBottom:12}}>📋</div><div style={{color:C.muted,fontSize:14}}>Sin solicitudes pendientes</div></div>)}
        {requests.map(r=>(
          <div key={r.id} style={{background:C.card,border:`1px solid ${C.accent}`,borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div><div style={{fontSize:16,marginBottom:3}}>{r.client}</div><div style={{fontSize:12,color:C.muted}}>{r.service}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:15,color:C.accent,fontWeight:600}}>{r.time}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{fmt(r.date)}</div></div>
            </div>
            {r.phone&&<div style={{fontSize:12,color:C.muted,marginBottom:4}}>Tel: {r.phone}</div>}
            {r.notes&&<div style={{fontSize:12,color:C.muted,marginBottom:8}}>Notas: {r.notes}</div>}
            <div style={{background:r.depositConfirmed?"rgba(110,201,138,0.1)":"rgba(201,110,110,0.1)",border:`1px solid ${r.depositConfirmed?C.success:C.danger}`,borderRadius:8,padding:"8px 10px",marginBottom:8,fontSize:12}}>
              {r.depositConfirmed&&r.proofSentByWhatsapp?(<span style={{color:C.success}}>✓ Dice haber transferido ${r.depositAmount||50} y enviado su comprobante por WhatsApp — búscalo por su nombre y verifica antes de aprobar</span>):(<span style={{color:C.danger}}>⚠ No confirmó el anticipo o no envió comprobante — revisa antes de aprobar</span>)}
            </div>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button onClick={()=>approveRequest(r)} className="tap" style={{flex:1,background:"rgba(110,201,138,0.15)",border:`1px solid ${C.success}`,color:C.success,borderRadius:10,padding:"11px 0",fontSize:13,cursor:"pointer"}}>✓ Aprobar</button>
              <button onClick={()=>rejectRequest(r.id)} className="tap" style={{flex:1,background:"rgba(201,110,110,0.15)",border:`1px solid ${C.danger}`,color:C.danger,borderRadius:10,padding:"11px 0",fontSize:13,cursor:"pointer"}}>✕ Rechazar</button>
            </div>
          </div>
        ))}
      </div>)}

      {view==="reminders"&&(<div style={{padding:"16px"}}><div style={{fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:6}}>Recordatorios WhatsApp</div><div style={{fontSize:13,color:C.muted,marginBottom:20}}>Citas de hoy dentro de las próximas 2 horas</div>{reminderAppts.length===0&&(<div style={{textAlign:"center",padding:"40px 0"}}><div style={{fontSize:40,marginBottom:12}}>✅</div><div style={{color:C.muted,fontSize:14}}>Sin recordatorios pendientes ahora</div><div style={{color:C.muted,fontSize:12,marginTop:8}}>Regresa cuando falten 2 horas o menos</div></div>)}{reminderAppts.map(a=>{const mins=Math.round(minutesUntil(a.date,a.time));const isNow=a._rs==="ahora";return(<div key={a.id} style={{background:isNow?"rgba(201,169,110,0.08)":C.card,border:`1px solid ${isNow?C.accent:C.border}`,borderRadius:12,padding:"16px",marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}><div><div style={{fontSize:16,marginBottom:3}}>{a.client}</div><div style={{fontSize:12,color:C.muted}}>{a.service}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:18,color:C.accent,fontWeight:600}}>{a.time}</div><div style={{fontSize:11,marginTop:3,color:isNow?C.accent:C.muted}}>{isNow?`⏰ en ${mins} min`:`en ${Math.round(mins/60*10)/10}h`}</div></div></div><div style={{background:"rgba(0,0,0,0.35)",borderRadius:8,padding:"10px 12px",fontSize:12,color:C.muted,marginBottom:12,lineHeight:1.6,borderLeft:`2px solid ${C.border}`}}>Hola {a.client} 👋 — Cita hoy a las {a.time} para {a.service}. ¡Te esperamos! 💛</div><a href={buildWAMsg(a)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:isNow?"#25D366":"rgba(37,211,102,0.15)",border:"1px solid #25D366",color:isNow?"#fff":"#25D366",borderRadius:10,padding:"12px 0",fontSize:14,textDecoration:"none",width:"100%",boxSizing:"border-box"}}><span style={{fontSize:18}}>📲</span> Enviar por WhatsApp</a></div>);})}{appts.filter(a=>a.date===today&&a.status==="confirmada"&&!a.phone).length>0&&(<div style={{marginTop:24}}><div style={{fontSize:10,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:10}}>Sin teléfono registrado</div>{appts.filter(a=>a.date===today&&a.status==="confirmada"&&!a.phone).map(a=>(<div key={a.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",opacity:0.6}}><div><div style={{fontSize:14}}>{a.client}</div><div style={{fontSize:12,color:C.muted}}>{a.service}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:14,color:C.accent}}>{a.time}</div><button onClick={()=>openEdit(a)} style={{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",padding:0,marginTop:4}}>+ agregar tel.</button></div></div>))}</div>)}</div>)}
      {view==="history"&&(<div style={{padding:"16px"}}><input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Buscar clienta por nombre o teléfono…" style={{...S.input,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px 14px",marginBottom:16}}/>{!searchQ.trim()&&(<div><div style={{fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:12}}>Todas las clientas</div>{Object.entries(appts.reduce((acc,a)=>{if(!acc[a.client])acc[a.client]={client:a.client,phone:a.phone,appts:[]};acc[a.client].appts.push(a);return acc;},{})).map(([name,data])=>(<div key={name} onClick={()=>setSearchQ(name)} className="tap" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:15}}>{data.client}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{data.phone}</div></div><div style={{fontSize:12,color:C.muted}}>{data.appts.length} cita{data.appts.length!==1?"s":""}</div></div>))}</div>)}{searchQ.trim()&&clientHistory.length===0&&<div style={{color:C.muted,fontSize:14,textAlign:"center",padding:"40px 0"}}>No se encontró ninguna clienta</div>}{clientHistory.map(c=>(<div key={c.client} style={{marginBottom:24}}><div style={{fontSize:16,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>{c.client}{vipMap[c.client]&&<span style={{fontSize:11,color:C.vip}}>⭐ VIP</span>}</div><div style={{fontSize:12,color:C.muted,marginBottom:12}}>{c.phone} · {c.appts.length} cita{c.appts.length!==1?"s":""}</div>{c.appts.map(a=><HistoryRow key={a.id} a={a} onClick={()=>{setActiveA(a);setModal("detail");}}/>)}</div>))}</div>)}
      {modal&&(<div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"flex-end"}}><div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto",borderTop:`1px solid ${C.border}`,maxHeight:"88vh",overflowY:"auto"}}>
        {modal==="detail"&&activeA&&(<><ModalHeader title="Detalle de cita" onClose={()=>setModal(null)}/><div style={{marginBottom:10}}><Label>Clienta</Label><Val>{activeA.client}</Val></div><div style={{marginBottom:10}}><Label>Teléfono</Label><Val>{activeA.phone||"—"}</Val></div><div style={{marginBottom:10}}><Label>Servicio</Label><Val>{activeA.service}</Val></div><div style={{marginBottom:10}}><Label>Tipo de clienta</Label><Val>{activeA.isNew?"Nueva":"Ya era clienta"}</Val></div><div style={{display:"flex",gap:16,marginBottom:10}}><div><Label>Fecha</Label><Val>{fmt(activeA.date)}</Val></div><div><Label>Hora</Label><Val>{activeA.time}</Val></div></div>{activeA.price&&<div style={{marginBottom:10}}><Label>Precio</Label><Val>{money(activeA.price)}</Val></div>}{activeA.deposit&&<div style={{marginBottom:10}}><Label>Anticipo</Label><Val>{money(activeA.deposit)}</Val></div>}{activeA.notes&&<div style={{marginBottom:10}}><Label>Notas</Label><Val>{activeA.notes}</Val></div>}<div style={{marginBottom:20}}><Label>Estado</Label><span style={{display:"inline-block",padding:"3px 12px",borderRadius:20,fontSize:12,background:`${C[STATUS_COLORS[activeA.status]||"success"]}22`,color:C[STATUS_COLORS[activeA.status]||"success"]}}>{STATUS_LABELS[activeA.status]||activeA.status}</span></div><div style={{display:"flex",gap:10,marginBottom:10}}><button onClick={()=>openEdit(activeA)} className="tap" style={{...S.btn,flex:1,justifyContent:"center"}}>Editar / Mover</button></div>{activeA.status==="confirmada"?(<div style={{display:"flex",gap:10,marginBottom:10}}><button onClick={()=>cancelAppt(activeA.id)} className="tap" style={{...S.btn,flex:1,justifyContent:"center",background:"rgba(201,110,110,0.15)",borderColor:C.danger,color:C.danger}}>Canceló</button><button onClick={()=>noShowAppt(activeA.id)} className="tap" style={{...S.btn,flex:1,justifyContent:"center",background:"rgba(224,164,88,0.15)",borderColor:C.warning,color:C.warning}}>No llegó</button></div>):(<div style={{marginBottom:10}}><button onClick={()=>restore(activeA.id)} className="tap" style={{...S.btn,width:"100%",justifyContent:"center"}}>Restaurar como confirmada</button></div>)}{activeA.phone&&activeA.status==="confirmada"&&(<a href={buildWAMsg(activeA)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"rgba(37,211,102,0.12)",border:"1px solid #25D366",color:"#25D366",borderRadius:10,padding:"12px 0",fontSize:14,textDecoration:"none",width:"100%",boxSizing:"border-box"}}>📲 Enviar recordatorio por WhatsApp</a>)}</>)}
        {(modal==="new"||modal==="edit")&&(<><ModalHeader title={modal==="new"?"Nueva cita":"Editar cita"} onClose={()=>setModal(null)}/><Field label="Nombre de clienta"><input style={S.input} value={form.client} onChange={e=>setF("client",e.target.value)} placeholder="Ej. Sofía Ramírez"/></Field><Field label="Tipo de clienta"><div style={{display:"flex",gap:8}}><button type="button" onClick={()=>setF("isNew",true)} className="tap" style={{flex:1,padding:"11px 0",borderRadius:8,border:`1px solid ${form.isNew?C.accent:C.border}`,background:form.isNew?C.accentFade:"transparent",color:form.isNew?C.accent:C.muted,fontSize:13,cursor:"pointer"}}>Nueva</button><button type="button" onClick={()=>setF("isNew",false)} className="tap" style={{flex:1,padding:"11px 0",borderRadius:8,border:`1px solid ${!form.isNew?C.accent:C.border}`,background:!form.isNew?C.accentFade:"transparent",color:!form.isNew?C.accent:C.muted,fontSize:13,cursor:"pointer"}}>Ya es clienta</button></div></Field><Field label="Teléfono (opcional)"><input style={S.input} value={form.phone} onChange={e=>setF("phone",e.target.value)} placeholder="9981234567" inputMode="numeric"/></Field><Field label="Servicio"><select style={S.input} value={form.service} onChange={e=>setForm(f=>({...f,service:e.target.value,price:priceForService(e.target.value)}))}>{SERVICES.map(s=><option key={s}>{s}</option>)}</select></Field><div style={{display:"flex",gap:12}}><Field label="Fecha" style={{flex:1}}><input style={S.input} type="date" value={form.date} onChange={e=>setF("date",e.target.value)}/></Field><Field label="Hora" style={{flex:1}}><input style={S.input} type="time" value={form.time} onChange={e=>setF("time",e.target.value)}/></Field></div><div style={{display:"flex",gap:12}}><Field label="Precio (opcional)" style={{flex:1}}><input style={S.input} value={form.price} onChange={e=>setF("price",e.target.value.replace(/[^0-9.]/g,""))} placeholder="Ej. 850" inputMode="decimal"/></Field><Field label="Anticipo (opcional)" style={{flex:1}}><input style={S.input} value={form.deposit} onChange={e=>setF("deposit",e.target.value.replace(/[^0-9.]/g,""))} placeholder="Ej. 100" inputMode="decimal"/></Field></div><Field label="Notas (opcional)"><textarea style={{...S.input,height:70,resize:"none"}} value={form.notes} onChange={e=>setF("notes",e.target.value)} placeholder="Alergias, preferencias…"/></Field><button onClick={modal==="new"?saveNew:saveEdit} className="tap" style={{...S.btn,width:"100%",justifyContent:"center",padding:"14px",fontSize:15,marginTop:4}}>{modal==="new"?"Guardar cita":"Actualizar cita"}</button></>)}
      </div></div>)}
    </div>
  );
}
ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
