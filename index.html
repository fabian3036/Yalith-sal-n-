<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Yalith Salón" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>Yalith Salón · Agenda</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#0d0d0d; font-family:'Georgia',serif; overscroll-behavior:none; }
    input, select, textarea, button { font-family:'Georgia',serif; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:#0d0d0d; }
    ::-webkit-scrollbar-thumb { background:#333; border-radius:4px; }
    .tap:active { opacity:0.7; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const SERVICES = ["Extensiones clásicas","Extensiones volumen","Extensiones mega volumen","Retoque clásico","Retoque volumen","Lifting de pestañas","Diseño de cejas"];
const C = {bg:"#0d0d0d",card:"#161616",accent:"#c9a96e",accentFade:"rgba(201,169,110,0.12)",text:"#f0ece4",muted:"#7a7269",border:"rgba(201,169,110,0.18)",danger:"#c96e6e",success:"#6ec98a"};
const pad=n=>String(n).padStart(2,"0");
const MONTHS=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const fmt=d=>{const[y,m,dd]=d.split("-");return `${dd} ${MONTHS[+m-1]} ${y}`;};
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
const weekDates=base=>{const d=new Date(base+"T00:00:00"),day=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-((day+6)%7));return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return `${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}`;});};
const DAY_NAMES=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
let _id=Date.now();
const uid=()=>String(++_id);
const minutesUntil=(dateStr,timeStr)=>{const[h,m]=timeStr.split(":").map(Number);const d=new Date(dateStr+"T00:00:00");d.setHours(h,m,0,0);return(d-new Date())/60000;};
const getReminderStatus=a=>{if(a.status==="cancelada")return null;const mins=minutesUntil(a.date,a.time);if(mins<0)return "pasada";if(mins<=120)return "ahora";if(mins<=180)return "pronto";return "pendiente";};
const cleanPhone=phone=>{const digits=phone.replace(/\D/g,"");if(digits.startsWith("52")&&digits.length>=12)return digits;return "52"+digits.replace(/^0+/,"");};
const buildWAMsg=a=>{const msg=`¡Hola ${a.client}! 👋\n\nTe recordamos que tienes tu cita en *Yalith Salón* hoy a las *${a.time}* para *${a.service}*.\n\nTe esperamos 💛\n\n_Por favor confirma tu asistencia respondiendo este mensaje._`;return `https://wa.me/${cleanPhone(a.phone)}?text=${encodeURIComponent(msg)}`;};
const STORAGE_KEY="yalith_agenda_v2";
const DEMO=[{id:uid(),client:"María López",phone:"9981234567",service:"Extensiones volumen",date:todayStr(),time:"10:00",notes:"Alérgica a látex",status:"confirmada"},{id:uid(),client:"Sofía Ramírez",phone:"9982345678",service:"Retoque clásico",date:todayStr(),time:"12:30",notes:"",status:"confirmada"},{id:uid(),client:"Valeria Torres",phone:"9983456789",service:"Lifting de pestañas",date:todayStr(),time:"15:00",notes:"Primera visita",status:"confirmada"}];
const loadAppts=()=>{try{const raw=localStorage.getItem(STORAGE_KEY);if(raw){const p=JSON.parse(raw);if(Array.isArray(p)&&p.length>0)return p;}}catch{}return DEMO;};
const saveAppts=appts=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(appts));return true;}catch{return false;}};
const S={btn:{display:"inline-flex",alignItems:"center",gap:6,background:C.accentFade,border:`1px solid ${C.accent}`,color:C.accent,borderRadius:10,padding:"10px 16px",fontSize:13,cursor:"pointer",letterSpacing:0.5},navBtn:{background:"none",border:`1px solid ${C.border}`,color:C.muted,width:38,height:38,borderRadius:8,cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"},input:{width:"100%",background:"#0d0d0d",border:`1px solid rgba(201,169,110,0.25)`,borderRadius:8,padding:"12px",color:C.text,fontSize:15,outline:"none"}};
function Label({children}){return <div style={{fontSize:10,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:5}}>{children}</div>;}
function Val({children}){return <div style={{fontSize:15,color:C.text}}>{children}</div>;}
function Field({label,children,style}){return <div style={{marginBottom:14,...style}}><Label>{label}</Label>{children}</div>;}
function ModalHeader({title,onClose}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><div style={{fontSize:18,color:C.text}}>{title}</div><button onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:26,cursor:"pointer",lineHeight:1}}>×</button></div>);}
function ApptCard({a,onClick,compact}){const rs=getReminderStatus(a);const showWA=!compact&&a.phone&&(rs==="ahora"||rs==="pronto");return(<div onClick={onClick} className="tap" style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${a.status==="cancelada"?C.danger:C.accent}`,borderRadius:10,padding:compact?"10px 12px":"14px 16px",marginBottom:10,cursor:"pointer",opacity:a.status==="cancelada"?0.5:1}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:compact?14:16,color:C.text,marginBottom:3}}>{a.client}</div><div style={{fontSize:12,color:C.muted}}>{a.service}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:15,color:C.accent,fontWeight:600}}>{a.time}</div>{compact&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{fmt(a.date)}</div>}{showWA&&<div style={{fontSize:10,color:"#25D366",marginTop:4}}>📲 listo</div>}</div></div></div>);}
function App(){
  const[appts,setAppts]=useState(loadAppts);
  const[savedMsg,setSavedMsg]=useState("");
  const[view,setView]=useState("week");
  const[selDate,setSelDate]=useState(todayStr());
  const[weekBase,setWeekBase]=useState(todayStr());
  const[modal,setModal]=useState(null);
  const[activeA,setActiveA]=useState(null);
  const[searchQ,setSearchQ]=useState("");
  const[now,setNow]=useState(new Date());
  const[form,setForm]=useState({client:"",phone:"",service:SERVICES[0],date:todayStr(),time:"10:00",notes:""});
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(t);},[]);
  useEffect(()=>{const ok=saveAppts(appts);setSavedMsg(ok?"✓ guardado":"⚠ error");const t=setTimeout(()=>setSavedMsg(""),2500);return()=>clearTimeout(t);},[appts]);
  const week=useMemo(()=>weekDates(weekBase),[weekBase]);
  const byDate=useMemo(()=>{const m={};appts.forEach(a=>{if(!m[a.date])m[a.date]=[];m[a.date].push(a);});Object.keys(m).forEach(k=>m[k].sort((a,b)=>a.time.localeCompare(b.time)));return m;},[appts]);
  const dayAppts=byDate[selDate]||[];
  const today=todayStr();
  const reminderAppts=useMemo(()=>appts.filter(a=>a.status==="confirmada"&&a.phone).map(a=>({...a,_rs:getReminderStatus(a)})).filter(a=>a._rs==="ahora"||a._rs==="pronto").sort((a,b)=>a.time.localeCompare(b.time)),[appts,now]);
  const badge=reminderAppts.filter(a=>a._rs==="ahora").length;
  const clientHistory=useMemo(()=>{if(!searchQ.trim())return[];const q=searchQ.toLowerCase(),cl={};appts.forEach(a=>{if(a.client.toLowerCase().includes(q)||a.phone.includes(q)){if(!cl[a.client])cl[a.client]={client:a.client,phone:a.phone,appts:[]};cl[a.client].appts.push(a);}});return Object.values(cl).map(c=>({...c,appts:c.appts.sort((a,b)=>b.date.localeCompare(a.date))}));},[searchQ,appts]);
  const openNew=date=>{setForm({client:"",phone:"",service:SERVICES[0],date:date||selDate,time:"10:00",notes:""});setModal("new");};
  const saveNew=()=>{if(!form.client.trim())return;setAppts(p=>[...p,{...form,id:uid(),status:"confirmada"}]);setModal(null);};
  const openEdit=a=>{setForm({client:a.client,phone:a.phone,service:a.service,date:a.date,time:a.time,notes:a.notes});setActiveA(a);setModal("edit");};
  const saveEdit=()=>{setAppts(p=>p.map(a=>a.id===activeA.id?{...a,...form}:a));setModal(null);};
  const cancelAppt=id=>{setAppts(p=>p.map(a=>a.id===id?{...a,status:"cancelada"}:a));setModal(null);};
  const restore=id=>{setAppts(p=>p.map(a=>a.id===id?{...a,status:"confirmada"}:a));setModal(null);};
  const shiftDay=delta=>{const d=new Date(selDate+"T00:00:00");d.setDate(d.getDate()+delta);setSelDate(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);};
  const shiftWeek=delta=>{const d=new Date(weekBase+"T00:00:00");d.setDate(d.getDate()+delta*7);setWeekBase(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);};
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,maxWidth:480,margin:"0 auto",paddingBottom:40}}>
      <div style={{padding:"max(env(safe-area-inset-top),20px) 20px 0px"}}>
        <div style={{padding:"16px 0 0",borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",paddingBottom:14}}>
            <div><div style={{fontSize:10,letterSpacing:4,color:C.accent,textTransform:"uppercase",marginBottom:4}}>Agenda</div><div style={{fontSize:26,fontWeight:400,letterSpacing:1}}>Yalith Salón</div></div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              {savedMsg&&<div style={{fontSize:10,color:savedMsg.startsWith("✓")?C.success:C.danger}}>{savedMsg}</div>}
              <button onClick={()=>openNew()} style={S.btn} className="tap">+ Nueva cita</button>
            </div>
          </div>
          <div style={{display:"flex"}}>
            {[["week","Semana"],["day","Día"],["history","Historial"],["reminders","📲"]].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"10px 0",background:"none",border:"none",cursor:"pointer",color:view===v?C.accent:C.muted,borderBottom:view===v?`2px solid ${C.accent}`:"2px solid transparent",fontSize:13,position:"relative"}}>
                {l}{v==="reminders"&&badge>0&&<span style={{position:"absolute",top:6,right:"14%",background:C.danger,color:"#fff",fontSize:9,borderRadius:10,padding:"1px 5px"}}>{badge}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      {view==="week"&&(<div style={{padding:"16px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><button onClick={()=>shiftWeek(-1)} style={S.navBtn} className="tap">‹</button><span style={{fontSize:13,color:C.muted}}>{fmt(week[0])} — {fmt(week[6])}</span><button onClick={()=>shiftWeek(1)} style={S.navBtn} className="tap">›</button></div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>{week.map((d,i)=>{const confirmed=(byDate[d]||[]).filter(a=>a.status==="confirmada").length;const isToday=d===today,isSel=d===selDate;return(<button key={d} onClick={()=>{setSelDate(d);setView("day");}} className="tap" style={{background:isSel?C.accentFade:isToday?"rgba(255,255,255,0.04)":"none",border:`1px solid ${isToday?C.accent:C.border}`,borderRadius:10,padding:"10px 4px",cursor:"pointer",textAlign:"center"}}><div style={{fontSize:9,color:C.muted,letterSpacing:1,marginBottom:3}}>{DAY_NAMES[i]}</div><div style={{fontSize:18,color:isToday?C.accent:C.text,fontWeight:isToday?600:400}}>{d.split("-")[2]}</div>{confirmed>0&&<div style={{marginTop:5,display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center"}}>{Array.from({length:Math.min(confirmed,3)}).map((_,j)=><div key={j} style={{width:5,height:5,borderRadius:"50%",background:C.accent}}/>)}</div>}</button>);})}</div><div style={{marginTop:20}}><div style={{fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:12}}>Hoy · {fmt(today)}</div>{(byDate[today]||[]).filter(a=>a.status==="confirmada").length===0?<div style={{color:C.muted,fontSize:14,textAlign:"center",padding:"20px 0"}}>Sin citas hoy</div>:(byDate[today]||[]).filter(a=>a.status==="confirmada").map(a=><ApptCard key={a.id} a={a} onClick={()=>{setActiveA(a);setModal("detail");}}/>)}</div></div>)}
      {view==="day"&&(<div style={{padding:"16px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><button onClick={()=>shiftDay(-1)} style={S.navBtn} className="tap">‹</button><div style={{textAlign:"center"}}><div style={{fontSize:20}}>{fmt(selDate)}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{dayAppts.filter(a=>a.status==="confirmada").length} citas confirmadas</div></div><button onClick={()=>shiftDay(1)} style={S.navBtn} className="tap">›</button></div><button onClick={()=>openNew(selDate)} className="tap" style={{...S.btn,width:"100%",justifyContent:"center",marginBottom:16}}>+ Agregar cita para este día</button>{dayAppts.length===0?<div style={{color:C.muted,fontSize:14,textAlign:"center",padding:"40px 0"}}>Sin citas este día</div>:dayAppts.map(a=><ApptCard key={a.id} a={a} onClick={()=>{setActiveA(a);setModal("detail");}}/>)}</div>)}
      {view==="reminders"&&(<div style={{padding:"16px"}}><div style={{fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:6}}>Recordatorios WhatsApp</div><div style={{fontSize:13,color:C.muted,marginBottom:20}}>Citas de hoy dentro de las próximas 2 horas</div>{reminderAppts.length===0&&(<div style={{textAlign:"center",padding:"40px 0"}}><div style={{fontSize:40,marginBottom:12}}>✅</div><div style={{color:C.muted,fontSize:14}}>Sin recordatorios pendientes ahora</div><div style={{color:C.muted,fontSize:12,marginTop:8}}>Regresa cuando falten 2 horas o menos</div></div>)}{reminderAppts.map(a=>{const mins=Math.round(minutesUntil(a.date,a.time));const isNow=a._rs==="ahora";return(<div key={a.id} style={{background:isNow?"rgba(201,169,110,0.08)":C.card,border:`1px solid ${isNow?C.accent:C.border}`,borderRadius:12,padding:"16px",marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}><div><div style={{fontSize:16,marginBottom:3}}>{a.client}</div><div style={{fontSize:12,color:C.muted}}>{a.service}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:18,color:C.accent,fontWeight:600}}>{a.time}</div><div style={{fontSize:11,marginTop:3,color:isNow?C.accent:C.muted}}>{isNow?`⏰ en ${mins} min`:`en ${Math.round(mins/60*10)/10}h`}</div></div></div><div style={{background:"rgba(0,0,0,0.35)",borderRadius:8,padding:"10px 12px",fontSize:12,color:C.muted,marginBottom:12,lineHeight:1.6,borderLeft:`2px solid ${C.border}`}}>Hola {a.client} 👋 — Cita hoy a las {a.time} para {a.service}. ¡Te esperamos! 💛</div><a href={buildWAMsg(a)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:isNow?"#25D366":"rgba(37,211,102,0.15)",border:"1px solid #25D366",color:isNow?"#fff":"#25D366",borderRadius:10,padding:"12px 0",fontSize:14,textDecoration:"none",width:"100%",boxSizing:"border-box"}}><span style={{fontSize:18}}>📲</span> Enviar por WhatsApp</a></div>);})}{appts.filter(a=>a.date===today&&a.status==="confirmada"&&!a.phone).length>0&&(<div style={{marginTop:24}}><div style={{fontSize:10,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:10}}>Sin teléfono registrado</div>{appts.filter(a=>a.date===today&&a.status==="confirmada"&&!a.phone).map(a=>(<div key={a.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",opacity:0.6}}><div><div style={{fontSize:14}}>{a.client}</div><div style={{fontSize:12,color:C.muted}}>{a.service}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:14,color:C.accent}}>{a.time}</div><button onClick={()=>openEdit(a)} style={{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",padding:0,marginTop:4}}>+ agregar tel.</button></div></div>))}</div>)}</div>)}
      {view==="history"&&(<div style={{padding:"16px"}}><input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Buscar clienta por nombre o teléfono…" style={{...S.input,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px 14px",marginBottom:16}}/>{!searchQ.trim()&&(<div><div style={{fontSize:10,letterSpacing:3,color:C.muted,textTransform:"uppercase",marginBottom:12}}>Todas las clientas</div>{Object.entries(appts.reduce((acc,a)=>{if(!acc[a.client])acc[a.client]={client:a.client,phone:a.phone,appts:[]};acc[a.client].appts.push(a);return acc;},{})).map(([name,data])=>(<div key={name} onClick={()=>setSearchQ(name)} className="tap" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:15}}>{data.client}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{data.phone}</div></div><div style={{fontSize:12,color:C.muted}}>{data.appts.length} cita{data.appts.length!==1?"s":""}</div></div>))}</div>)}{searchQ.trim()&&clientHistory.length===0&&<div style={{color:C.muted,fontSize:14,textAlign:"center",padding:"40px 0"}}>No se encontró ninguna clienta</div>}{clientHistory.map(c=>(<div key={c.client} style={{marginBottom:24}}><div style={{fontSize:16,marginBottom:4}}>{c.client}</div><div style={{fontSize:12,color:C.muted,marginBottom:12}}>{c.phone} · {c.appts.length} cita{c.appts.length!==1?"s":""}</div>{c.appts.map(a=><ApptCard key={a.id} a={a} onClick={()=>{setActiveA(a);setModal("detail");}} compact/>)}</div>))}</div>)}
      {modal&&(<div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"flex-end"}}><div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:480,margin:"0 auto",borderTop:`1px solid ${C.border}`,maxHeight:"88vh",overflowY:"auto"}}>
        {modal==="detail"&&activeA&&(<><ModalHeader title="Detalle de cita" onClose={()=>setModal(null)}/><div style={{marginBottom:10}}><Label>Clienta</Label><Val>{activeA.client}</Val></div><div style={{marginBottom:10}}><Label>Teléfono</Label><Val>{activeA.phone||"—"}</Val></div><div style={{marginBottom:10}}><Label>Servicio</Label><Val>{activeA.service}</Val></div><div style={{display:"flex",gap:16,marginBottom:10}}><div><Label>Fecha</Label><Val>{fmt(activeA.date)}</Val></div><div><Label>Hora</Label><Val>{activeA.time}</Val></div></div>{activeA.notes&&<div style={{marginBottom:10}}><Label>Notas</Label><Val>{activeA.notes}</Val></div>}<div style={{marginBottom:20}}><Label>Estado</Label><span style={{display:"inline-block",padding:"3px 12px",borderRadius:20,fontSize:12,background:activeA.status==="confirmada"?"rgba(110,201,138,0.15)":"rgba(201,110,110,0.15)",color:activeA.status==="confirmada"?C.success:C.danger}}>{activeA.status}</span></div><div style={{display:"flex",gap:10,marginBottom:10}}><button onClick={()=>openEdit(activeA)} className="tap" style={{...S.btn,flex:1,justifyContent:"center"}}>Editar / Mover</button>{activeA.status==="confirmada"?<button onClick={()=>cancelAppt(activeA.id)} className="tap" style={{...S.btn,flex:1,justifyContent:"center",background:"rgba(201,110,110,0.15)",borderColor:C.danger,color:C.danger}}>Cancelar</button>:<button onClick={()=>restore(activeA.id)} className="tap" style={{...S.btn,flex:1,justifyContent:"center"}}>Restaurar</button>}</div>{activeA.phone&&activeA.status==="confirmada"&&(<a href={buildWAMsg(activeA)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"rgba(37,211,102,0.12)",border:"1px solid #25D366",color:"#25D366",borderRadius:10,padding:"12px 0",fontSize:14,textDecoration:"none",width:"100%",boxSizing:"border-box"}}>📲 Enviar recordatorio por WhatsApp</a>)}</>)}
        {(modal==="new"||modal==="edit")&&(<><ModalHeader title={modal==="new"?"Nueva cita":"Editar cita"} onClose={()=>setModal(null)}/><Field label="Nombre de clienta"><input style={S.input} value={form.client} onChange={e=>setF("client",e.target.value)} placeholder="Ej. Sofía Ramírez"/></Field><Field label="Teléfono (opcional)"><input style={S.input} value={form.phone} onChange={e=>setF("phone",e.target.value)} placeholder="9981234567" inputMode="numeric"/></Field><Field label="Servicio"><select style={S.input} value={form.service} onChange={e=>setF("service",e.target.value)}>{SERVICES.map(s=><option key={s}>{s}</option>)}</select></Field><div style={{display:"flex",gap:12}}><Field label="Fecha" style={{flex:1}}><input style={S.input} type="date" value={form.date} onChange={e=>setF("date",e.target.value)}/></Field><Field label="Hora" style={{flex:1}}><input style={S.input} type="time" value={form.time} onChange={e=>setF("time",e.target.value)}/></Field></div><Field label="Notas (opcional)"><textarea style={{...S.input,height:70,resize:"none"}} value={form.notes} onChange={e=>setF("notes",e.target.value)} placeholder="Alergias, preferencias…"/></Field><button onClick={modal==="new"?saveNew:saveEdit} className="tap" style={{...S.btn,width:"100%",justifyContent:"center",padding:"14px",fontSize:15,marginTop:4}}>{modal==="new"?"Guardar cita":"Actualizar cita"}</button></>)}
      </div></div>)}
    </div>
  );
}
ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
